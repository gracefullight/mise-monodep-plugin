[tools]
rust = "1.93"

[tasks.test]
description = "Run monodep tests"
run = "cargo test"
sources = ["src/**/*.rs", "tests/**/*.rs", "Cargo.toml"]

[tasks.build]
description = "Build monodep release binary"
run = "cargo build --release"

[tasks.lint]
description = "Check clippy and formatting"
run = ["cargo clippy -- -D warnings", "cargo fmt --check"]
